name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app
        env:
          VITE_PLASMIC_PROJECT_ID: ${{ secrets.VITE_PLASMIC_PROJECT_ID }}
          VITE_PLASMIC_PUBLIC_TOKEN: ${{ secrets.VITE_PLASMIC_PUBLIC_TOKEN }}

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DATABASERPG_5595B }}' > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy --only database,functions,hosting --project databaserpg-5595b
          EXIT_CODE=$?
          rm -f "$RUNNER_TEMP/sa.json"
          exit $EXIT_CODE
